name = "fin-app"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Workers Static Assets model: everything in /public is served as static files;
# this Worker (src/index.js) runs only for /api/* (see run_worker_first), which
# holds the prices/tickers/mentor endpoints. Deploy command: `npx wrangler deploy`.
#
# `name` must match the Cloudflare project ("fin-app"). Secrets (dashboard →
# the Worker → Settings → Variables and Secrets, add as Secret, then redeploy):
#   ANTHROPIC_API_KEY   – your prepaid Anthropic key (holds the mentor)
#   MENTOR_PIN          – passphrase the app sends to gate /api/mentor

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
