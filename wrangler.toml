name = "finapp"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Workers Static Assets model: everything in /public is served as static files;
# this Worker (src/index.js) runs only for /api/* (see run_worker_first), which
# holds the prices/tickers/mentor endpoints. Deploy command: `npx wrangler deploy`.
#
# `name` must match the Cloudflare project ("finapp"). Secrets (dashboard →
# the Worker → Settings → Variables and Secrets, add as Secret, then redeploy):
#   ANTHROPIC_API_KEY   – your prepaid Anthropic key (holds the mentor)
#   MENTOR_PIN          – passphrase the app sends to gate /api/mentor

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Claude's Desk ledger store. The daily routine writes the paper-run JSON into the
# `ledger` table via the Cloudflare D1 MCP connector; the Worker reads it for
# /api/paper-run (no git push, no redeploy per run).
[[d1_databases]]
binding = "DESK_DB"
database_name = "finapp-desk"
database_id = "580c8596-00bc-45a1-bf52-1187f91c1ec8"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
