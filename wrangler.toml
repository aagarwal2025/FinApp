name = "finapp"
pages_build_output_dir = "public"
compatibility_date = "2026-06-01"

# Cloudflare Pages serves everything in /public as static assets and
# auto-discovers serverless endpoints in /functions. No build command needed.
#
# Secrets (set in the Cloudflare dashboard → Settings → Environment variables,
# or `wrangler pages secret put NAME` if you install Node + wrangler locally):
#   ANTHROPIC_API_KEY   – your prepaid Anthropic API key (holds the mentor)
#   MENTOR_PIN          – a short passphrase the app sends to gate /api/mentor
#
# Local dev (optional, needs Node + `npm i -g wrangler`):
#   wrangler pages dev public     # reads secrets from .dev.vars
